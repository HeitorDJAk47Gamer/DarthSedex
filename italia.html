<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itália - DarthSedex</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
  <link rel="shortcut icon" href="img/italia.png" type="image/png">
</head>
<body class="italia-theme">
  <div class="container">
    <header style="border-bottom-color: rgba(255,255,255,0.2);">
      <div class="logo">
        <img src="img/italia.png" alt="Icon" class="img-icon">
      </div>
      <nav>
        <a class="nav-link" href="index.html">Voltar para o Início</a>
      </nav>
    </header>

    <main class="flex-center">
      <h1>🇮🇹 Mamamia seu lixo! 🇮🇹</h1>

      <section class="card" style="margin-bottom: 2rem;">
        <img src="img/darthm.png" class="img-hero" alt="Darth Mussolini" style="max-width: 200px;">
        <h2>Darth Mussolini</h2>
      </section>

      <h2 style="color: white; margin-top: 2rem; font-weight: 800;">Não coma pizza com ketchup!!!</h2>

      <div class="grid-cards" style="width: 100%;">
        <section class="card">
          <img src="img/pizza.png" class="img-hero" alt="Pizza">
          <p>Vou te bater com uma pizza!</p>
        </section>

        <section class="card">
          <img src="img/kill.png" class="img-hero" alt="Kill">
          <p>Nunca confie em italianos.</p>
        </section>

        <section class="card">
          <img src="img/torre.jpeg" class="img-hero" alt="Torre">
          <p>Enfia a Torre Eifell no rabo!</p>
        </section>
      </div>
    </main>
  </div>
</body>
</html>
